<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club Court — Padel Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #ebebeb;
    }

    a {
      color: inherit;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    a:hover {
      opacity: 0.7;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 680px;
    }

    /* ─── Main 2×2 grid, right column spans both rows ─── */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1.4fr 1fr;
      flex: 1 1 auto;
      min-height: 0;
    }

    /* Top-left: black panel */
    .panel-dark {
      background: #000;
      position: relative;
      padding: 32px 40px;
    }

    .panel-dark .nav-link {
      color: #fff;
      font-size: 15px;
      letter-spacing: 0.02em;
    }

    /* Logo floats across both columns */
    .logo {
      position: absolute;
      top: 32px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 3;
      font-family: 'DM Serif Display', serif;
      font-size: clamp(34px, 4.2vw, 56px);
      color: #fff;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
      width: 200vw;
      margin-left: -50vw;
    }

    /* Right column: hero image spanning both rows */
    .hero-image {
      grid-column: 2;
      grid-row: 1 / 3;
      position: relative;
      overflow: hidden;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 25%;
      display: block;
    }

    .hero-image .nav-link {
      position: absolute;
      top: 32px;
      right: 40px;
      color: #fff;
      font-size: 15px;
      letter-spacing: 0.02em;
      z-index: 2;
    }

    /* Bottom-left: events */
    .panel-events {
      background: #ebebeb;
      padding: 40px 40px 32px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .events-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(24px, 2.6vw, 34px);
      color: #111;
      font-weight: 400;
    }

    .events-details {
      display: flex;
      gap: 48px;
      align-items: flex-end;
    }

    .events-schedule {
      font-size: 13px;
      color: #111;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .events-description {
      font-size: 13px;
      color: #111;
      line-height: 1.6;
      max-width: 260px;
    }

    /* ─── CTA ─── */
    .cta {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      padding: 28px 40px 44px;
      background: #ebebeb;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: clamp(18px, 1.8vw, 24px);
      color: #111;
      border: 1.5px solid #222;
      border-radius: 999px;
      padding: 20px 90px;
      background: transparent;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
      letter-spacing: 0.02em;
    }

    .cta-button:hover {
      background: #111;
      color: #fff;
      opacity: 1;
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .page {
        height: auto;
        min-height: 100vh;
      }

      .main {
        grid-template-columns: 1fr;
        grid-template-rows: auto 300px auto;
      }

      .panel-dark {
        padding: 24px;
        min-height: 80px;
      }

      .logo {
        width: 100vw;
        margin-left: 0;
        left: 0;
        right: 0;
      }

      .hero-image {
        grid-column: 1;
        grid-row: 2;
      }

      .hero-image .nav-link {
        top: 20px;
        right: 24px;
      }

      .panel-events {
        padding: 28px 24px 24px;
        gap: 28px;
      }

      .events-details {
        flex-direction: column;
        gap: 10px;
        align-items: flex-start;
      }

      .cta {
        padding: 24px 24px 36px;
      }

      .cta-button {
        padding: 18px 48px;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="main">
      <div class="panel-dark">
        <a href="#" class="nav-link">Sign up</a>
        <span class="logo">Club &nbsp;Court</span>
      </div>

      <div class="hero-image">
        <img
          src="https://images.unsplash.com/photo-1770230901556-4e1c0bacfb09?auto=format&fit=crop&w=1400&q=80"
          alt="Padel players in action on a blue court"
        >
        <a href="#" class="nav-link">About the club</a>
      </div>

      <div class="panel-events">
        <h2 class="events-title">Upcoming events</h2>
        <div class="events-details">
          <p class="events-schedule">Weekly · Thursdays · 8 PM</p>
          <p class="events-description">Social padel, rotating matches, DJ sets, and post-game drinks.</p>
        </div>
      </div>
    </div>

    <div class="cta">
      <a href="#" class="cta-button">Join our club</a>
    </div>

  </div>
</body>
</html>
